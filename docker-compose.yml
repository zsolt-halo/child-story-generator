services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: starlight
      POSTGRES_USER: starlight
      POSTGRES_PASSWORD: starlight
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U starlight -d starlight"]
      interval: 5s
      timeout: 5s
      retries: 5
    profiles: [offline]

  backend:
    build: .
    ports:
      - "8000:8000"
      - "9464:9464"
    env_file: .env
    environment:
      DATABASE_URL: "${DATABASE_URL}"
      CORS_ORIGINS: "http://localhost:5173,http://localhost:3000"
      LOG_LEVEL: DEBUG
      OTEL_EXPORTER: "${OTEL_EXPORTER:-none}"
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "http://otel-lgtm:4318/v1/traces"
      OTEL_SERVICE_NAME: "starlight-backend"
      ANIMATION_MODE: "${ANIMATION_MODE:-remote}"
      WORKER_AUTH_TOKEN: "${WORKER_AUTH_TOKEN:-dev-token}"
    volumes:
      - stories-data:/app/stories

  frontend:
    build: ./web
    ports:
      - "3000:3000"
    depends_on:
      - backend

  otel-lgtm:
    image: grafana/otel-lgtm:latest
    ports:
      - "3001:3000"    # Grafana (3000 taken by frontend)
      - "4318:4318"    # OTLP HTTP receiver
    volumes:
      - ./grafana/dashboards/starlight-overview.json:/otel-lgtm/starlight-overview.json:ro
      - ./grafana/provisioning/dashboards/default.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/starlight.yaml:ro
    profiles: [observability]

  animation-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      BACKEND_URL: http://backend:8000
      WORKER_TOKEN: "${WORKER_AUTH_TOKEN:-dev-token}"
      WAN_REPO: /wan
      WAN_MODEL_DIR: /models/Wan2.2-TI2V-5B
    volumes:
      - C:/Users/netzs/codes/Wan2.2:/wan:ro
      - C:/Users/netzs/codes/Wan2.2/Wan2.2-TI2V-5B:/models/Wan2.2-TI2V-5B:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      - backend
    profiles: [animation]

volumes:
  postgres-data:
  stories-data:
