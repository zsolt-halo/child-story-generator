# Deploy with: kubectl apply -k k8s/
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: starlight

resources:
  - namespace.yml
  - configmap.yml
  # Note: Create secrets.yml from secrets.yml.example before deploying
  # - secrets.yml
  - stories-pvc.yml
  - postgres-pvc.yml
  - postgres-statefulset.yml
  - postgres-service.yml
  - deployment.yml
  - service.yml
  - frontend-deployment.yml
  - frontend-service.yml
  - nodeport.yml

commonLabels:
  project: starlight
