apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: starlight
spec:
  type: ClusterIP
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
  selector:
    app: minio
---
# NodePort for local docker-compose + console access
apiVersion: v1
kind: Service
metadata:
  name: minio-nodeport
  namespace: starlight
spec:
  type: NodePort
  ports:
    - name: api
      port: 9000
      targetPort: 9000
      nodePort: 30900
    - name: console
      port: 9001
      targetPort: 9001
      nodePort: 30901
  selector:
    app: minio
