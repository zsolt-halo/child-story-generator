# NodePort for Nginx Proxy Manager external routing
# NPM proxies stories.smuggled.in -> <node-ip>:30082
apiVersion: v1
kind: Service
metadata:
  name: frontend-nodeport
  namespace: starlight
spec:
  type: NodePort
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30082
  selector:
    app: frontend
