apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: starlight
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:zsolt-halo/child-story-generator.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: starlight
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
