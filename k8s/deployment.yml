apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: starlight
  labels:
    app: backend
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      initContainers:
        - name: alembic-migrate
          image: ghcr.io/zsolt-halo/starlight-backend:latest
          command: ["python", "-m", "alembic", "upgrade", "head"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: starlight-secrets
                  key: database-url
      containers:
        - name: backend
          image: ghcr.io/zsolt-halo/starlight-backend:latest
          ports:
            - containerPort: 8000
            - containerPort: 9464
              name: metrics
          env:
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: starlight-secrets
                  key: gemini-api-key
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: starlight-secrets
                  key: database-url
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: starlight-config
                  key: CORS_ORIGINS
            - name: OTEL_EXPORTER
              value: "otlp"
            - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
              value: "http://tempo.monitoring.svc.cluster.local:4318/v1/traces"
            - name: OTEL_SERVICE_NAME
              value: "starlight-backend"
          volumeMounts:
            - name: stories
              mountPath: /app/stories
          resources:
            requests:
              memory: "512Mi"
              cpu: "100m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: stories
          persistentVolumeClaim:
            claimName: stories-data
