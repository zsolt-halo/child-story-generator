# Copy this file to settings.toml and fill in your values.
#
# Text + image generation:
#   Set GEMINI_API_KEY env var (get one at https://aistudio.google.com/apikey)

[defaults]
character = "lana-llama"
narrator = "whimsical"
style = "digital"
pages = 16
text_model = "gemini-2.5-pro"
image_model = "imagen-4.0-fast-generate-001"
image_model_multimodal = "gemini-2.5-flash-image"  # fallback for ref image support

# Optional: set keys here instead of env vars
# gemini_api_key = ""
